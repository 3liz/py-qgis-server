#-------------
# Build
#-------------

.build-docker:
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  tags:
    - factory-dind
  stage: docker
  rules:
    - if: $RELEASE_BRANCH == "true"
    - !reference [.release_rules]
  script:
    - make manifest
    - make -C docker build deliver FLAVOR=$QGIS_FLAVOR BUILD_TARGET=amqp
  environment:
    name: snap
  artifacts:
    paths:
      - "docker/factory-${QGIS_FLAVOR}.manifest"

.ltr-rc:
  after_script:
    - cat ${DOCKERPASS} | docker login -u 3liz --password-stdin
    - docker tag ${REGISTRY_URL}/qgis-map-server:$QGIS_FLAVOR-dev  3liz/qgis-map-server:ltr-rc
    - docker push 3liz/qgis-map-server:ltr-rc

build-docker:3.44:
  extends: .build-docker
  variables:
    QGIS_FLAVOR: "3.44"
  after_script:
      - !reference [.ltr-rc, after_script] 

.release-rc:
  after_script:
    - cat ${DOCKERPASS} | docker login -u 3liz --password-stdin
    - docker tag ${REGISTRY_URL}/qgis-map-server:$QGIS_FLAVOR-dev  3liz/qgis-map-server:release-rc
    - docker push 3liz/qgis-map-server:release-rc

build-docker:4.0:
  extends: .build-docker
  variables:
    QGIS_FLAVOR: "4.0"
  after_script:
      - !reference [.release-rc, after_script] 


#
# Compatibility with previous ltr
#

build-docker:3.34:
  extends: .build-docker
  variables:
    QGIS_FLAVOR: "3.34"

build-docker:3.40:
  extends: .build-docker
  variables:
    QGIS_FLAVOR: "3.40"

#-------------
# deploy
#-------------

deploy_snap:
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  tags:
    - factory-plain
  stage: deploy
  rules:
    - if: $RELEASE_BRANCH == "true"
    - !reference [.release_rules]
  script:
    - update-service map
  environment:
    name: snap
  allow_failure: true

#-------------
# Release
#-------------

.release:
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  tags:
    - factory-dind
  stage: release
  rules:
    - !reference [.release_rules]
  script:
    - release-image qgis-map-server-$QGIS_FLAVOR
    - push-to-docker-hub --clean
  environment:
    name: production
  when: manual
  # See https://about.gitlab.com/blog/2021/05/20/dag-manual-fix/#what-if-i-dont-want-this-new-behavior
  allow_failure: false
  variables:
    FACTORY_MANIFEST: "docker/factory-${QGIS_FLAVOR}.manifest"


release:4.0:
  extends: .release
  variables:
    QGIS_FLAVOR: "4.0"
  dependencies:
    - build-docker:4.0


release:3.44:
  extends: .release
  variables:
    QGIS_FLAVOR: "3.44"
  dependencies:
    - build-docker:3.44

release:3.40:
  extends: .release
  variables:
    QGIS_FLAVOR: "3.40"
  dependencies:
    - build-docker:3.40


release:3.34:
  extends: .release
  variables:
    QGIS_FLAVOR: "3.34"
  dependencies:
    - build-docker:3.34

