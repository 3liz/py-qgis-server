#-------------
# Build
#-------------

.build-docker:
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  stage: docker
  script:
    - make manifest
    - make -C docker build deliver pushrc clean FLAVOR=$QGIS_FLAVOR BUILD_TARGET=amqp
  environment:
    name: snap
  artifacts:
    paths:
      - "docker/factory-${QGIS_FLAVOR}.manifest"
  only:
    refs:
      - tags
      - master
  tags:
    - factory-dind


build-docker:3.44:
  extends: .build-docker
  variables:
    QGIS_FLAVOR: "3.44"

build-docker:3.40:
  extends: .build-docker
  variables:
    QGIS_FLAVOR: "3.40"

#
# Compatibility with previous ltr
#

build-docker:3.34:
  extends: .build-docker
  variables:
    QGIS_FLAVOR: "3.34"


#-------------
# deploy
#-------------

deploy_snap:
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  stage: deploy
  script:
    - update-service map
  environment:
    name: snap
  allow_failure: true
  only:
    refs:
       - tags
       - master
  tags:
    - factory-plain

#-------------
# Release
#-------------

.release:
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  stage: release
  script:
    - release-image qgis-map-server-$QGIS_FLAVOR
    - push-to-docker-hub --clean
  environment:
    name: production
  when: manual
  # See https://about.gitlab.com/blog/2021/05/20/dag-manual-fix/#what-if-i-dont-want-this-new-behavior
  allow_failure: false
  only:
    refs:
      - tags
  tags:
    - factory-dind
  variables:
    FACTORY_MANIFEST: "docker/factory-${QGIS_FLAVOR}.manifest"

release:3.44:
  extends: .release
  variables:
    QGIS_FLAVOR: "3.44"
  dependencies:
    - build-docker:3.44

release:3.40:
  extends: .release
  variables:
    QGIS_FLAVOR: "3.40"
  dependencies:
    - build-docker:3.40


release:3.34:
  extends: .release
  variables:
    QGIS_FLAVOR: "3.34"
  dependencies:
    - build-docker:3.34

